name: Update Escalation Target Loot

on:
  workflow_dispatch:
  schedule:
    - cron: "7 * * * *"
    - cron: "37 * * * *"

permissions:
  contents: write
  pages: write

concurrency:
  group: update-escalation-target-loot
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch public Escalation data
        env:
          ESCALATION_PRIMARY_SOURCE_URL: ${{ secrets.ESCALATION_PRIMARY_SOURCE_URL }}
        run: python3 scripts/update-escalation-data.py --submit-indexnow

      - name: Commit changes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git add assets/data/escalation-target-loot.json division-2/loot/index.html division-2/escalation/index.html division-2/prototype-gear/index.html sitemap.xml sitemap.txt llms.txt feed.xml
          if git diff --cached --quiet; then
            echo "No Escalation data changes."
            gh api -X POST "repos/$GITHUB_REPOSITORY/pages/builds"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Refresh guide hub data"
          git push
          gh api -X POST "repos/$GITHUB_REPOSITORY/pages/builds"
