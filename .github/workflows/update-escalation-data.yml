name: Update Guide Data

on:
  workflow_dispatch:
  schedule:
    - cron: "7 * * * *"
    - cron: "17,32,47 10 * * *"

permissions:
  contents: write
  pages: write

concurrency:
  group: update-guide-data
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update guide data
        env:
          ESCALATION_PRIMARY_SOURCE_URL: ${{ secrets.ESCALATION_PRIMARY_SOURCE_URL }}
        run: python3 scripts/update-escalation-data.py --submit-indexnow

      - name: Commit changes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git add assets/data/escalation-target-loot.json assets/data/division-2-status.json division-2/loot/index.html division-2/server-status/index.html division-2/escalation/index.html division-2/prototype-gear/index.html sitemap.xml sitemap.txt llms.txt feed.xml
          if git diff --cached --quiet; then
            echo "No guide data changes."
            gh api -X POST "repos/$GITHUB_REPOSITORY/pages/builds"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          suffix="$(date -u +%s%N | sha256sum | cut -c1-8)"
          git commit -m "site update $suffix"
          git push
          gh api -X POST "repos/$GITHUB_REPOSITORY/pages/builds"
