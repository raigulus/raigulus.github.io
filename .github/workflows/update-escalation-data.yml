name: Update Escalation Target Loot

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write

concurrency:
  group: update-escalation-target-loot
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch public Escalation data
        env:
          ESCALATION_PRIMARY_SOURCE_URL: ${{ secrets.ESCALATION_PRIMARY_SOURCE_URL }}
        run: python3 scripts/update-escalation-data.py --submit-indexnow

      - name: Commit changes
        run: |
          if git diff --quiet; then
            echo "No Escalation data changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/data/escalation-target-loot.json division-2/escalation/index.html sitemap.xml
          git commit -m "Update Escalation target loot data"
          git push
